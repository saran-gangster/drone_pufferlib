run_name: baseline_mvp
device: auto
seed: 7
artifacts_dir: artifacts
env:
  base_config: configs/env.yaml
  difficulty: easy
  train_seed_start: 0
  train_seed_stride: 100000
  eval_seed_start: 500000
  eval_fixed_seeds: [500000, 500001, 500002]
vectorization:
  num_workers: 6
  envs_per_worker: 4
  multiprocessing: true
training:
  total_env_steps: 200000
  rollout_length: 256
  eval_interval: 50000
  minibatch_size: 2048
  update_epochs: 4
  learning_rate: 0.00025
  gamma: 0.995
  gae_lambda: 0.97
  clip_coef: 0.2
  entropy_coef: 0.015
  value_coef: 0.5
  max_grad_norm: 0.5
  normalize_advantages: true
evaluation:
  episodes: 50
  random_policy_episodes: 20
  video_episodes: 3
model:
  channels: [32, 64, 64]
  hidden_size: 512
